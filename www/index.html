<!doctype html>
<!--
  First-run server picker (Capacitor webDir). Capacitor loads this bundled page when no server
  origin is configured yet (see MainActivity). The user picks/enters a Lyndrix origin; we hand it to
  the native BackendSwitcher plugin, which persists it and recreates the Activity so the app reloads
  onto the chosen instance. Plain vanilla JS — no bundler, no @capacitor/core import needed (the
  native bridge is injected as window.Capacitor on local content).
-->
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Lyndrix</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; min-height: 100%;
        background: #0b1220; color: #e5e9f0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      body {
        /* Edge-to-edge: keep content clear of the status bar / notch and gesture nav. */
        padding:
          calc(env(safe-area-inset-top) + 2rem)
          calc(env(safe-area-inset-right) + 1.5rem)
          calc(env(safe-area-inset-bottom) + 1.5rem)
          calc(env(safe-area-inset-left) + 1.5rem);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        min-height: 100vh;
      }
      .card { width: 100%; max-width: 26rem; }
      .brand { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; margin: 0 0 0.25rem; }
      .sub { font-size: 0.85rem; color: #94a3b8; margin: 0 0 1.75rem; line-height: 1.5; }
      label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
        color: #94a3b8; margin-bottom: 0.4rem; }
      input {
        width: 100%; font-size: 1rem; padding: 0.8rem 0.9rem;
        color: #e5e9f0; background: #111a2e; border: 1px solid #243049; border-radius: 0.6rem;
        outline: none;
      }
      input:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18); }
      button {
        width: 100%; margin-top: 1.1rem; font-size: 1rem; font-weight: 600;
        padding: 0.85rem 1rem; border: 0; border-radius: 0.6rem; cursor: pointer;
        color: #04121f; background: #38bdf8;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      .msg { margin-top: 0.9rem; font-size: 0.85rem; min-height: 1.2rem; }
      .msg.err { color: #f87171; }
      .msg.info { color: #38bdf8; }
      .spinner { display: inline-block; width: 14px; height: 14px; vertical-align: -2px;
        margin-right: 6px; border-radius: 50%; border: 2px solid rgba(4,18,31,0.35);
        border-top-color: #04121f; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="brand">Lyndrix</h1>
      <p class="sub">Choose the Lyndrix server this app should connect to. You can change it later
        under Settings → App.</p>

      <label for="url">Server URL</label>
      <input id="url" type="url" inputmode="url" autocapitalize="none" autocorrect="off"
             spellcheck="false" placeholder="https://lyndrix.example.com" />
      <button id="connect" type="button">Connect</button>
      <div id="msg" class="msg" role="status"></div>
    </div>

    <script>
      (function () {
        var input = document.getElementById('url');
        var btn = document.getElementById('connect');
        var msg = document.getElementById('msg');

        function setMsg(text, kind) {
          msg.className = 'msg' + (kind ? ' ' + kind : '');
          msg.innerHTML = text;
        }

        function plugin() {
          return window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BackendSwitcher;
        }

        // Wait briefly for the native bridge to be injected, then prefill with the build default.
        var tries = 0;
        (function waitForBridge() {
          var p = plugin();
          if (p) {
            p.getServerUrl()
              .then(function (r) { if (r && r.url && !input.value) input.value = r.url; })
              .catch(function () {});
            return;
          }
          if (tries++ < 40) { setTimeout(waitForBridge, 50); return; }
          setMsg('Native bridge unavailable — please reopen the app.', 'err');
        })();

        function isValidHttps(v) {
          try {
            var u = new URL(v.trim());
            return u.protocol === 'https:' && !!u.host;
          } catch (e) { return false; }
        }

        function connect() {
          var v = input.value.trim();
          if (!isValidHttps(v)) {
            setMsg('Enter a valid https:// URL.', 'err');
            return;
          }
          var p = plugin();
          if (!p) { setMsg('Native bridge unavailable — please reopen the app.', 'err'); return; }
          btn.disabled = true;
          setMsg('<span class="spinner"></span>Connecting to ' + v + '…', 'info');
          // On success the native side recreates the Activity and this page is torn down.
          p.setServerUrl({ url: v }).catch(function (e) {
            btn.disabled = false;
            setMsg('Could not connect: ' + (e && e.message ? e.message : e), 'err');
          });
        }

        btn.addEventListener('click', connect);
        input.addEventListener('keydown', function (e) { if (e.key === 'Enter') connect(); });
      })();
    </script>
  </body>
</html>
