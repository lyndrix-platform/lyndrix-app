name: release-apk

# Tag-driven release: push vX.Y.Z -> build the signed prod + dev TWA-replacement APKs
# (Capacitor) and attach them to the GitHub Release.
#
# Unlike the old Bubblewrap flow, the build does NOT need network access to the internal Lyndrix
# host — Capacitor loads the UI from its server origin at RUNTIME. The build only needs the public
# npm / Maven Central / Google registries, so this can run on a GitHub-hosted runner.
#
# Toolchain: Capacitor 7 requires Node 20+ and (because its Android template compiles to Java 21)
# JDK 21. Both are provisioned by the setup steps below.
#
# Secrets (repo settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of android.keystore  (base64 -w0 android.keystore)
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_PASSWORD      key (alias 'lyndrix') password

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Restore signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Resolve version (guard against version.py drift) and inject into Gradle
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PYV="$(awk -F'\"' '/^__version__/{print $2}' version.py)"
          if [ "$TAG" != "$PYV" ]; then
            echo "::error::git tag ($TAG) != version.py ($PYV) — bump version.py before tagging"; exit 1
          fi
          echo "APP_VERSION_NAME=$TAG" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Sync Capacitor project
        run: npx cap sync android

      - name: Build signed APKs (prod + dev)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleProdRelease assembleDevRelease

      - name: Publish APKs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/prod/release/*.apk
            android/app/build/outputs/apk/dev/release/*.apk
          fail_on_unmatched_files: true
