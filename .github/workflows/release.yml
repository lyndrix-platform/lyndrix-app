name: release-apk

# Tag-driven release: push vX.Y.Z → build signed prod + dev APKs and attach
# them to the GitHub Release alongside SHA-256 checksums.
#
# Capacitor 7 requires JDK 21 (Java 21 bytecode target) and Node 20+.
# The build does NOT need internal-host network access — the app loads the UI
# from its configured server origin at RUNTIME.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64     base64 of android.keystore  (base64 -w0 android.keystore)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_PASSWORD        key password (alias 'lyndrix')

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # caches ~/.npm between runs

      - uses: android-actions/setup-android@v3

      # ── Gradle build cache ─────────────────────────────────────────────────
      # Caches the Gradle home and per-project build cache so incremental
      # builds re-use already-compiled bytecode (~8 min → ~3 min cold npm).
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # ── Keystore ──────────────────────────────────────────────────────────
      - name: Restore signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      # ── Version guard ─────────────────────────────────────────────────────
      - name: Resolve version and guard against version.py drift
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PYV="$(awk -F'"' '/^__version__/{print $2}' version.py)"
          if [ "$TAG" != "$PYV" ]; then
            echo "::error::git tag ($TAG) != version.py ($PYV) — bump version.py before tagging"
            exit 1
          fi
          echo "APP_VERSION_NAME=$TAG"                       >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=${{ github.run_number }}"  >> "$GITHUB_ENV"

      # ── JS / Capacitor sync ───────────────────────────────────────────────
      - name: Install JS dependencies
        run: npm ci

      - name: Sync Capacitor project
        run: npx cap sync android

      # ── Gradle build ──────────────────────────────────────────────────────
      - name: Build signed APKs (prod + dev)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleProdRelease assembleDevRelease --no-daemon

      # ── Rename + checksum ─────────────────────────────────────────────────
      # Use env: to keep the version string out of the shell interpolation path
      # (safe pattern: ${{ ... }} → env var → shell variable).
      - name: Rename APKs and generate SHA-256 checksums
        env:
          VERSION: ${{ env.APP_VERSION_NAME }}
        run: |
          set -euo pipefail
          PROD_SRC="android/app/build/outputs/apk/prod/release/app-prod-release.apk"
          DEV_SRC="android/app/build/outputs/apk/dev/release/app-dev-release.apk"
          PROD="lyndrix-${VERSION}-prod.apk"
          DEV="lyndrix-${VERSION}-dev.apk"
          SUMS="lyndrix-${VERSION}-sha256.txt"
          cp "$PROD_SRC" "$PROD"
          cp "$DEV_SRC"  "$DEV"
          sha256sum "$PROD" "$DEV" > "$SUMS"
          # Persist paths for the upload step
          echo "PROD_APK=$PROD" >> "$GITHUB_ENV"
          echo "DEV_APK=$DEV"   >> "$GITHUB_ENV"
          echo "SUMS_FILE=$SUMS" >> "$GITHUB_ENV"
          # Job summary
          echo "### Release assets" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | SHA-256 |"  >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"  >> "$GITHUB_STEP_SUMMARY"
          while read -r hash file; do
            echo "| \`$file\` | \`$hash\` |" >> "$GITHUB_STEP_SUMMARY"
          done < "$SUMS"

      # ── Publish to GitHub Release ─────────────────────────────────────────
      - name: Publish APKs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-changelog from commits/PRs since last tag
          files: |
            ${{ env.PROD_APK }}
            ${{ env.DEV_APK }}
            ${{ env.SUMS_FILE }}
          fail_on_unmatched_files: true
